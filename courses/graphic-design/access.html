<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Graphic Design – VersaTech Experience Campus</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body class="access-page-body">

<div class="network-bg">
  <canvas id="network-canvas"></canvas>
</div>

<div style="position:fixed;top:-150px;left:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,0.12) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:1;"></div>

<div class="access-card">
  <a href="../../index.html" class="access-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to Campus
  </a>

  <div class="access-course-badge" style="color:var(--purple-light);background:rgba(124,58,237,0.1);border-color:rgba(124,58,237,0.3);">
    🎨 Graphic Design Masterclass
  </div>

  <h1>Unlock Your<br/>Course 🔓</h1>
  <p>Enter your enrolment key to access the Graphic Design Masterclass. Keys are provided after registration.</p>

  <div class="input-group">
    <label for="enrolment-key">Enrolment Key</label>
    <input type="text" id="enrolment-key" class="key-input" placeholder="VTXDESIGN2026" autocomplete="off" spellcheck="false" />
    <div class="error-msg" id="error-msg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Invalid key. Check your key and try again.
    </div>
  </div>

  <button class="unlock-btn" id="unlock-btn" style="background:linear-gradient(135deg,var(--purple),var(--purple-light));">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
    Unlock Course
  </button>

  <p class="hint-text">
    Need a key? Contact us:<br/>
    <a href="https://wa.me/254700000000?text=Hi%2C%20I%20need%20a%20key%20for%20the%20Graphic%20Design%20Masterclass" style="color:var(--purple-light);text-decoration:none;" target="_blank">+254 700 000 000</a>
  </p>
</div>

<script src="../../js/access.js"></script>
<script src="../../js/modules.js"></script>
<script>
  initAccessPage('design');
</script>
</body>
</html>
